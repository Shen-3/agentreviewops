version: 1

risk:
  fail_level: high
  large_diff:
    max_files: 20
    max_lines: 800

critical_paths:
  - "auth/**"
  - "security/**"
  - "payments/**"
  - "infra/**"
  - ".github/workflows/**"
  - "Dockerfile"
  - "docker-compose.yml"
  - "package.json"
  - "pyproject.toml"
  - "requirements*.txt"

test_patterns:
  - "tests/**"
  - "**/*test*"
  - "**/*spec*"

agent_detection:
  branch_patterns:
    - "copilot/**"
    - "cursor/**"
    - "devin/**"
    - "codex/**"
    - "claude/**"
  pr_body_markers:
    - "Generated by"
    - "Co-authored-by: Copilot"
    - "Created by Devin"

rules:
  require_tests_for_code_changes: true
  flag_dependency_changes: true
  flag_ci_changes: true
  flag_auth_changes: true
  flag_large_generated_files: true

ai:
  enabled: false
  provider: null

plugins: []
