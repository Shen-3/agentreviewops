# Example AgentReviewOps config.
# To generate a preset config and workflow, run:
#   agentreview init --bundle starter
version: 1

risk:
  fail_level: high
  large_diff:
    max_files: 20
    max_lines: 800

critical_paths:
  - "auth/**"
  - "security/**"
  - "payments/**"
  - "infra/**"
  - ".github/workflows/**"
  - "Dockerfile"
  - "docker-compose.yml"
  - "package.json"
  - "pyproject.toml"
  - "requirements*.txt"

test_patterns:
  - "tests/**"
  - "**/*test*"
  - "**/*spec*"

agent_detection:
  branch_patterns:
    - "copilot/**"
    - "cursor/**"
    - "devin/**"
    - "codex/**"
    - "claude/**"
  pr_body_markers:
    - "Generated by"
    - "Co-authored-by: Copilot"
    - "Created by Devin"

rules:
  require_tests_for_code_changes: true
  flag_dependency_changes: true
  flag_ci_changes: true
  flag_auth_changes: true
  flag_large_generated_files: true

ai:
  enabled: false
  provider: null
  model: null
  base_url: null
  timeout_seconds: 15
  max_diff_chars: 12000

plugins: []

review_routing:
  enabled: true
  codeowners:
    enabled: true
    path: null
  rules:
    - id: security-review
      paths:
        - "auth/**"
        - "security/**"
        - "payments/**"
      rule_ids:
        - "sensitive-area-change"
        - "critical-path-change"
        - "python-subprocess-shell-true"
        - "python-eval-exec"
        - "python-unsafe-yaml-load"
      require_roles:
        - "maintainer"
        - "owner"
      reason: "Sensitive or dangerous code path changed."

    - id: ci-review
      paths:
        - ".github/workflows/**"
      rule_ids:
        - "ci-change"
        - "github-actions-write-all-permissions"
        - "github-actions-pull-request-target"
        - "github-actions-unpinned-action"
      require_roles:
        - "maintainer"
      reason: "CI/CD or supply-chain sensitive workflow changed."

    - id: dependency-review
      rule_ids:
        - "dependency-change"
      require_roles:
        - "maintainer"
      reason: "Dependency metadata changed."

    - id: block-risk-review
      risk_levels:
        - "block"
      require_roles:
        - "owner"
      reason: "Policy classified this pull request as block risk."
