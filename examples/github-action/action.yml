name: AgentReviewOps scan-diff
description: Analyze a prepared unified diff, generate a Markdown report, and optionally submit it to a self-hosted AgentReviewOps API.

inputs:
  diff-file:
    description: Path to the unified diff file to analyze.
    required: false
    default: agentreview.diff
  config:
    description: Path to the AgentReviewOps YAML config file.
    required: false
    default: .agentreview.yml
  output:
    description: Path where the Markdown report should be written.
    required: false
    default: agentreview-report.md
  json-output:
    description: Optional path to write structured AgentReviewOps JSON output.
    required: false
    default: ""
  sarif-output:
    description: Optional path to write AgentReviewOps SARIF output.
    required: false
    default: ""
  api-url:
    description: Optional AgentReviewOps API base URL for dashboard submission.
    required: false
    default: ""
  api-key:
    description: Optional AgentReviewOps API key for dashboard submission. Prefer a GitHub secret.
    required: false
    default: ""
  repository:
    description: Optional repository identifier such as owner/name.
    required: false
    default: ""
  pr-number:
    description: Optional pull request number.
    required: false
    default: ""
  title:
    description: Optional pull request title.
    required: false
    default: ""
  author:
    description: Optional pull request author or agent account.
    required: false
    default: ""
  agent-name:
    description: Optional detected or supplied AI agent name.
    required: false
    default: ""
  branch:
    description: Optional source branch name.
    required: false
    default: ""
  github-comment:
    description: Set to true to post or update the generated report as a GitHub pull request comment.
    required: false
    default: "false"
  request-reviewers:
    description: Request GitHub reviewers from AgentReviewOps review routing output.
    required: false
    default: "false"
  reviewer-request-mode:
    description: "Which reviewers to request: users, teams, or users-and-teams."
    required: false
    default: users-and-teams
  reviewer-request-failure-mode:
    description: Whether reviewer request failures should fail the job or only warn. One of warn, fail.
    required: false
    default: warn
  github-token:
    description: GitHub token used when github-comment, checks, or request-reviewers is true. Prefer github.token or a GitHub secret.
    required: false
    default: ""
  checks:
    description: Publish an AgentReviewOps GitHub Check Run.
    required: false
    default: "false"
  check-name:
    description: Name of the GitHub Check Run.
    required: false
    default: AgentReviewOps
  check-title:
    description: Title shown in the GitHub Check output.
    required: false
    default: AgentReviewOps policy gate
  head-sha:
    description: Pull request head SHA used when checks is true.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install AgentReviewOps from action
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run AgentReviewOps scan
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        AGENTREVIEW_INPUT_CHECK_NAME: ${{ inputs.check-name }}
        AGENTREVIEW_INPUT_CHECK_TITLE: ${{ inputs.check-title }}
        AGENTREVIEW_INPUT_CHECKS: ${{ inputs.checks }}
        AGENTREVIEW_INPUT_CONFIG: ${{ inputs.config }}
        AGENTREVIEW_INPUT_DIFF_FILE: ${{ inputs.diff-file }}
        AGENTREVIEW_INPUT_HEAD_SHA: ${{ inputs.head-sha }}
        AGENTREVIEW_INPUT_JSON_OUTPUT: ${{ inputs.json-output }}
        AGENTREVIEW_INPUT_OUTPUT: ${{ inputs.output }}
        AGENTREVIEW_INPUT_REPOSITORY: ${{ inputs.repository }}
        AGENTREVIEW_INPUT_REQUEST_REVIEWERS: ${{ inputs.request-reviewers }}
        AGENTREVIEW_INPUT_SARIF_OUTPUT: ${{ inputs.sarif-output }}
      run: |
        args=(
          --diff-file "$AGENTREVIEW_INPUT_DIFF_FILE"
          --config "$AGENTREVIEW_INPUT_CONFIG"
          --output "$AGENTREVIEW_INPUT_OUTPUT"
        )
        analysis_file="$AGENTREVIEW_INPUT_JSON_OUTPUT"
        if [ "$AGENTREVIEW_INPUT_REQUEST_REVIEWERS" = "true" ] && [ -z "$analysis_file" ]; then
          analysis_file="${RUNNER_TEMP:-.}/agentreview-analysis.json"
        fi
        if [ -n "$analysis_file" ]; then args+=(--json-output "$analysis_file"); fi
        if [ -n "$AGENTREVIEW_INPUT_SARIF_OUTPUT" ]; then args+=(--sarif-output "$AGENTREVIEW_INPUT_SARIF_OUTPUT"); fi
        if [ "$AGENTREVIEW_INPUT_CHECKS" = "true" ]; then
          args+=(
            --checks
            --repo "$AGENTREVIEW_INPUT_REPOSITORY"
            --head-sha "$AGENTREVIEW_INPUT_HEAD_SHA"
            --check-name "$AGENTREVIEW_INPUT_CHECK_NAME"
            --check-title "$AGENTREVIEW_INPUT_CHECK_TITLE"
          )
        fi
        agentreview scan-diff "${args[@]}"

    - name: Request GitHub reviewers
      if: ${{ inputs.request-reviewers == 'true' && inputs.github-token != '' && inputs.repository != '' && inputs.pr-number != '' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        AGENTREVIEW_INPUT_JSON_OUTPUT: ${{ inputs.json-output }}
        AGENTREVIEW_INPUT_REPOSITORY: ${{ inputs.repository }}
        AGENTREVIEW_INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        AGENTREVIEW_INPUT_REVIEWER_REQUEST_FAILURE_MODE: ${{ inputs.reviewer-request-failure-mode }}
        AGENTREVIEW_INPUT_REVIEWER_REQUEST_MODE: ${{ inputs.reviewer-request-mode }}
      run: |
        analysis_file="$AGENTREVIEW_INPUT_JSON_OUTPUT"
        if [ -z "$analysis_file" ]; then analysis_file="${RUNNER_TEMP:-.}/agentreview-analysis.json"; fi
        agentreview request-reviewers \
          --repo "$AGENTREVIEW_INPUT_REPOSITORY" \
          --pr "$AGENTREVIEW_INPUT_PR_NUMBER" \
          --analysis-file "$analysis_file" \
          --reviewer-request-mode "$AGENTREVIEW_INPUT_REVIEWER_REQUEST_MODE" \
          --reviewer-request-failure-mode "$AGENTREVIEW_INPUT_REVIEWER_REQUEST_FAILURE_MODE"

    - name: Submit AgentReviewOps analysis
      if: ${{ inputs.api-url != '' && inputs.api-key != '' }}
      shell: bash
      env:
        AGENTREVIEW_API_KEY: ${{ inputs.api-key }}
        AGENTREVIEW_INPUT_DIFF_FILE: ${{ inputs.diff-file }}
        AGENTREVIEW_INPUT_CONFIG: ${{ inputs.config }}
        AGENTREVIEW_INPUT_API_URL: ${{ inputs.api-url }}
        AGENTREVIEW_INPUT_REPOSITORY: ${{ inputs.repository }}
        AGENTREVIEW_INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        AGENTREVIEW_INPUT_TITLE: ${{ inputs.title }}
        AGENTREVIEW_INPUT_AUTHOR: ${{ inputs.author }}
        AGENTREVIEW_INPUT_AGENT_NAME: ${{ inputs.agent-name }}
        AGENTREVIEW_INPUT_BRANCH: ${{ inputs.branch }}
      run: |
        args=(
          --diff-file "$AGENTREVIEW_INPUT_DIFF_FILE"
          --config "$AGENTREVIEW_INPUT_CONFIG"
          --api-url "$AGENTREVIEW_INPUT_API_URL"
        )
        if [ -n "$AGENTREVIEW_INPUT_REPOSITORY" ]; then args+=(--repository "$AGENTREVIEW_INPUT_REPOSITORY"); fi
        if [ -n "$AGENTREVIEW_INPUT_PR_NUMBER" ]; then args+=(--pr "$AGENTREVIEW_INPUT_PR_NUMBER"); fi
        if [ -n "$AGENTREVIEW_INPUT_TITLE" ]; then args+=(--title "$AGENTREVIEW_INPUT_TITLE"); fi
        if [ -n "$AGENTREVIEW_INPUT_AUTHOR" ]; then args+=(--author "$AGENTREVIEW_INPUT_AUTHOR"); fi
        if [ -n "$AGENTREVIEW_INPUT_AGENT_NAME" ]; then args+=(--agent-name "$AGENTREVIEW_INPUT_AGENT_NAME"); fi
        if [ -n "$AGENTREVIEW_INPUT_BRANCH" ]; then args+=(--branch "$AGENTREVIEW_INPUT_BRANCH"); fi
        agentreview submit-diff "${args[@]}"

    - name: Comment on GitHub pull request
      if: ${{ inputs.github-comment == 'true' && inputs.github-token != '' && inputs.repository != '' && inputs.pr-number != '' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        AGENTREVIEW_INPUT_OUTPUT: ${{ inputs.output }}
        AGENTREVIEW_INPUT_REPOSITORY: ${{ inputs.repository }}
        AGENTREVIEW_INPUT_PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        agentreview comment-pr \
          --repo "$AGENTREVIEW_INPUT_REPOSITORY" \
          --pr "$AGENTREVIEW_INPUT_PR_NUMBER" \
          --report-file "$AGENTREVIEW_INPUT_OUTPUT"
