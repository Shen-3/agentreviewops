name: AgentReviewOps scan-diff
description: Analyze a prepared unified diff, generate a Markdown report, and optionally submit it to a self-hosted AgentReviewOps API.

inputs:
  diff-file:
    description: Path to the unified diff file to analyze.
    required: false
    default: agentreview.diff
  config:
    description: Path to the AgentReviewOps YAML config file.
    required: false
    default: .agentreview.yml
  output:
    description: Path where the Markdown report should be written.
    required: false
    default: agentreview-report.md
  api-url:
    description: Optional AgentReviewOps API base URL for dashboard submission.
    required: false
    default: ""
  api-key:
    description: Optional AgentReviewOps API key for dashboard submission. Prefer a GitHub secret.
    required: false
    default: ""
  repository:
    description: Optional repository identifier such as owner/name.
    required: false
    default: ""
  pr-number:
    description: Optional pull request number.
    required: false
    default: ""
  title:
    description: Optional pull request title.
    required: false
    default: ""
  author:
    description: Optional pull request author or agent account.
    required: false
    default: ""
  agent-name:
    description: Optional detected or supplied AI agent name.
    required: false
    default: ""
  branch:
    description: Optional source branch name.
    required: false
    default: ""
  github-comment:
    description: Set to true to post or update the generated report as a GitHub pull request comment.
    required: false
    default: "false"
  github-token:
    description: GitHub token used when github-comment is true. Prefer github.token or a GitHub secret.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install AgentReviewOps from checkout
      shell: bash
      run: python -m pip install -e "."

    - name: Run AgentReviewOps scan
      shell: bash
      run: agentreview scan-diff --diff-file "${{ inputs.diff-file }}" --config "${{ inputs.config }}" --output "${{ inputs.output }}"

    - name: Submit AgentReviewOps analysis
      if: ${{ inputs.api-url != '' && inputs.api-key != '' }}
      shell: bash
      env:
        AGENTREVIEW_API_KEY: ${{ inputs.api-key }}
        AGENTREVIEW_INPUT_DIFF_FILE: ${{ inputs.diff-file }}
        AGENTREVIEW_INPUT_CONFIG: ${{ inputs.config }}
        AGENTREVIEW_INPUT_API_URL: ${{ inputs.api-url }}
        AGENTREVIEW_INPUT_REPOSITORY: ${{ inputs.repository }}
        AGENTREVIEW_INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        AGENTREVIEW_INPUT_TITLE: ${{ inputs.title }}
        AGENTREVIEW_INPUT_AUTHOR: ${{ inputs.author }}
        AGENTREVIEW_INPUT_AGENT_NAME: ${{ inputs.agent-name }}
        AGENTREVIEW_INPUT_BRANCH: ${{ inputs.branch }}
      run: |
        args=(
          --diff-file "$AGENTREVIEW_INPUT_DIFF_FILE"
          --config "$AGENTREVIEW_INPUT_CONFIG"
          --api-url "$AGENTREVIEW_INPUT_API_URL"
        )
        if [ -n "$AGENTREVIEW_INPUT_REPOSITORY" ]; then args+=(--repository "$AGENTREVIEW_INPUT_REPOSITORY"); fi
        if [ -n "$AGENTREVIEW_INPUT_PR_NUMBER" ]; then args+=(--pr "$AGENTREVIEW_INPUT_PR_NUMBER"); fi
        if [ -n "$AGENTREVIEW_INPUT_TITLE" ]; then args+=(--title "$AGENTREVIEW_INPUT_TITLE"); fi
        if [ -n "$AGENTREVIEW_INPUT_AUTHOR" ]; then args+=(--author "$AGENTREVIEW_INPUT_AUTHOR"); fi
        if [ -n "$AGENTREVIEW_INPUT_AGENT_NAME" ]; then args+=(--agent-name "$AGENTREVIEW_INPUT_AGENT_NAME"); fi
        if [ -n "$AGENTREVIEW_INPUT_BRANCH" ]; then args+=(--branch "$AGENTREVIEW_INPUT_BRANCH"); fi
        agentreview submit-diff "${args[@]}"

    - name: Comment on GitHub pull request
      if: ${{ inputs.github-comment == 'true' && inputs.github-token != '' && inputs.repository != '' && inputs.pr-number != '' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        AGENTREVIEW_INPUT_OUTPUT: ${{ inputs.output }}
        AGENTREVIEW_INPUT_REPOSITORY: ${{ inputs.repository }}
        AGENTREVIEW_INPUT_PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        agentreview comment-pr \
          --repo "$AGENTREVIEW_INPUT_REPOSITORY" \
          --pr "$AGENTREVIEW_INPUT_PR_NUMBER" \
          --report-file "$AGENTREVIEW_INPUT_OUTPUT"
