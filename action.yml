name: AgentReviewOps
description: Policy-as-code risk gate for AI-generated pull requests.

inputs:
  github-token:
    description: GitHub token used to post or update the pull request comment.
    required: false
    default: ""
  config:
    description: Path to the AgentReviewOps YAML config file.
    required: false
    default: .agentreview.yml
  diff-file:
    description: Optional prepared unified diff file. When omitted on pull_request events, the action builds one.
    required: false
    default: ""
  output:
    description: Path where the Markdown report should be written.
    required: false
    default: agentreview-report.md
  comment:
    description: Set to true to post or update the generated report as a GitHub pull request comment.
    required: false
    default: "true"
  fail-on:
    description: Fail the job when risk is at or above this level. One of low, medium, high, block, never.
    required: false
    default: "never"
  api-url:
    description: Optional AgentReviewOps API base URL for self-hosted dashboard submission.
    required: false
    default: ""
  api-key:
    description: Optional AgentReviewOps API key for self-hosted dashboard submission. Prefer a GitHub secret.
    required: false
    default: ""
  repository:
    description: Optional repository identifier such as owner/name. Defaults to the GitHub repository context.
    required: false
    default: ""
  pr-number:
    description: Optional pull request number. Defaults to the pull_request event number when available.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install AgentReviewOps
      shell: bash
      run: python -m pip install -e "$GITHUB_ACTION_PATH"

    - name: Resolve diff and pull request metadata
      id: prepare
      shell: bash
      env:
        AGENTREVIEW_CONTEXT_REPOSITORY: ${{ github.repository }}
        AGENTREVIEW_EVENT_NAME: ${{ github.event_name }}
        AGENTREVIEW_EVENT_PATH: ${{ github.event_path }}
        AGENTREVIEW_INPUT_DIFF_FILE: ${{ inputs.diff-file }}
        AGENTREVIEW_INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        AGENTREVIEW_INPUT_REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail

        diff_file="$AGENTREVIEW_INPUT_DIFF_FILE"
        repository="$AGENTREVIEW_INPUT_REPOSITORY"
        pr_number="$AGENTREVIEW_INPUT_PR_NUMBER"

        if [ -z "$repository" ]; then
          repository="$AGENTREVIEW_CONTEXT_REPOSITORY"
        fi

        BASE_SHA=""
        HEAD_SHA=""
        EVENT_PR_NUMBER=""
        if [ -n "$AGENTREVIEW_EVENT_PATH" ] && [ -f "$AGENTREVIEW_EVENT_PATH" ]; then
          metadata_file="${RUNNER_TEMP:-.}/agentreview-event.env"
          python - <<'PY' > "$metadata_file"
        import json
        import os
        import shlex

        base_sha = ""
        head_sha = ""
        pr_number = ""
        event_path = os.environ.get("AGENTREVIEW_EVENT_PATH")
        if event_path:
            with open(event_path, encoding="utf-8") as event_file:
                event = json.load(event_file)
            pull_request = event.get("pull_request") or {}
            base_sha = ((pull_request.get("base") or {}).get("sha") or "")
            head_sha = ((pull_request.get("head") or {}).get("sha") or "")
            pr_number = str(pull_request.get("number") or event.get("number") or "")

        for key, value in {
            "BASE_SHA": base_sha,
            "HEAD_SHA": head_sha,
            "EVENT_PR_NUMBER": pr_number,
        }.items():
            print(f"{key}={shlex.quote(value)}")
        PY
          . "$metadata_file"
        fi

        if [ -z "$pr_number" ] && [ -n "$EVENT_PR_NUMBER" ]; then
          pr_number="$EVENT_PR_NUMBER"
        fi

        if [ -z "$diff_file" ]; then
          if [ "$AGENTREVIEW_EVENT_NAME" != "pull_request" ] && [ "$AGENTREVIEW_EVENT_NAME" != "pull_request_target" ]; then
            echo "AgentReviewOps requires diff-file outside pull_request events." >&2
            exit 2
          fi
          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ]; then
            echo "AgentReviewOps could not resolve pull request base/head SHAs from the event payload." >&2
            exit 2
          fi

          diff_file="${RUNNER_TEMP:-.}/agentreview.diff"
          git fetch --no-tags --prune --depth=100 origin "$BASE_SHA" "$HEAD_SHA" || true
          git diff --no-ext-diff --unified=3 "$BASE_SHA" "$HEAD_SHA" > "$diff_file"
        fi

        echo "diff-file=$diff_file" >> "$GITHUB_OUTPUT"
        echo "repository=$repository" >> "$GITHUB_OUTPUT"
        echo "pr-number=$pr_number" >> "$GITHUB_OUTPUT"

    - name: Run AgentReviewOps scan
      id: scan
      shell: bash
      env:
        AGENTREVIEW_DIFF_FILE: ${{ steps.prepare.outputs.diff-file }}
        AGENTREVIEW_CONFIG: ${{ inputs.config }}
        AGENTREVIEW_FAIL_ON: ${{ inputs.fail-on }}
        AGENTREVIEW_OUTPUT: ${{ inputs.output }}
      run: |
        set +e
        agentreview scan-diff \
          --diff-file "$AGENTREVIEW_DIFF_FILE" \
          --config "$AGENTREVIEW_CONFIG" \
          --output "$AGENTREVIEW_OUTPUT" \
          --fail-on "$AGENTREVIEW_FAIL_ON"
        status=$?
        set -e

        echo "exit-code=$status" >> "$GITHUB_OUTPUT"
        if [ "$status" -eq 1 ] && [ ! -s "$AGENTREVIEW_OUTPUT" ]; then
          exit "$status"
        fi
        if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
          exit "$status"
        fi

    - name: Submit AgentReviewOps analysis
      if: ${{ inputs.api-url != '' && inputs.api-key != '' }}
      shell: bash
      env:
        AGENTREVIEW_API_KEY: ${{ inputs.api-key }}
        AGENTREVIEW_API_URL: ${{ inputs.api-url }}
        AGENTREVIEW_CONFIG: ${{ inputs.config }}
        AGENTREVIEW_DIFF_FILE: ${{ steps.prepare.outputs.diff-file }}
        AGENTREVIEW_PR_NUMBER: ${{ steps.prepare.outputs.pr-number }}
        AGENTREVIEW_REPOSITORY: ${{ steps.prepare.outputs.repository }}
      run: |
        set -euo pipefail
        args=(
          --diff-file "$AGENTREVIEW_DIFF_FILE"
          --config "$AGENTREVIEW_CONFIG"
          --api-url "$AGENTREVIEW_API_URL"
        )
        if [ -n "$AGENTREVIEW_REPOSITORY" ]; then args+=(--repository "$AGENTREVIEW_REPOSITORY"); fi
        if [ -n "$AGENTREVIEW_PR_NUMBER" ]; then args+=(--pr "$AGENTREVIEW_PR_NUMBER"); fi
        agentreview submit-diff "${args[@]}"

    - name: Validate pull request comment inputs
      if: ${{ inputs.comment == 'true' && (inputs.github-token == '' || steps.prepare.outputs.pr-number == '') }}
      shell: bash
      run: |
        echo "AgentReviewOps comment=true requires github-token and a pull request number." >&2
        exit 2

    - name: Comment on GitHub pull request
      if: ${{ inputs.comment == 'true' && inputs.github-token != '' && steps.prepare.outputs.pr-number != '' }}
      shell: bash
      env:
        AGENTREVIEW_OUTPUT: ${{ inputs.output }}
        AGENTREVIEW_PR_NUMBER: ${{ steps.prepare.outputs.pr-number }}
        AGENTREVIEW_REPOSITORY: ${{ steps.prepare.outputs.repository }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        agentreview comment-pr \
          --repo "$AGENTREVIEW_REPOSITORY" \
          --pr "$AGENTREVIEW_PR_NUMBER" \
          --report-file "$AGENTREVIEW_OUTPUT"

    - name: Apply fail-on result
      shell: bash
      env:
        AGENTREVIEW_SCAN_EXIT_CODE: ${{ steps.scan.outputs.exit-code }}
      run: |
        status="${AGENTREVIEW_SCAN_EXIT_CODE:-0}"
        if [ "$status" -ne 0 ]; then
          exit "$status"
        fi
