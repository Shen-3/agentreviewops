# AgentReviewOps dogfooding config for this repository.
# Keep this policy useful for pull requests without making normal development noisy.
version: 1

risk:
  fail_level: high
  large_diff:
    max_files: 20
    max_lines: 800

critical_paths:
  - "auth/**"
  - "security/**"
  - "payments/**"
  - "infra/**"
  - "src/**"
  - "apps/api/**"
  - "apps/web/**"
  - "deploy/**"
  - "pyproject.toml"
  - "requirements*.txt"
  - "uv.lock"
  - "package.json"
  - "pnpm-lock.yaml"
  - ".github/workflows/**"
  - "action.yml"

test_patterns:
  - "tests/**"
  - "**/test_*.py"
  - "**/*_test.py"
  - "**/*test*"
  - "**/*spec*"

agent_detection:
  branch_patterns:
    - "copilot/**"
    - "cursor/**"
    - "devin/**"
    - "codex/**"
    - "claude/**"
  pr_body_markers:
    - "Generated by"
    - "Co-authored-by: Copilot"
    - "Created by Devin"

rules:
  require_tests_for_code_changes: true
  flag_dependency_changes: true
  flag_ci_changes: true
  flag_auth_changes: true
  flag_large_generated_files: true

ai:
  enabled: false
  provider: null
  model: null
  base_url: null
  timeout_seconds: 15
  max_diff_chars: 12000

plugins: []

review_routing:
  enabled: true
  codeowners:
    enabled: true
    path: null
  rules:
    - id: python-app-review
      paths:
        - "src/**"
        - "apps/api/**"
      rule_ids:
        - "missing-tests"
        - "sensitive-area-change"
        - "python-subprocess-shell-true"
        - "python-eval-exec"
        - "python-unsafe-yaml-load"
      require_roles:
        - "maintainer"
      reason: "Python application code or dangerous Python pattern changed."

    - id: frontend-review
      paths:
        - "apps/web/**"
      require_roles:
        - "maintainer"
      reason: "Dashboard frontend changed."

    - id: dependency-review
      paths:
        - "pyproject.toml"
        - "requirements*.txt"
        - "uv.lock"
        - "package.json"
        - "pnpm-lock.yaml"
      rule_ids:
        - "dependency-change"
      require_roles:
        - "maintainer"
      reason: "Dependency metadata changed."

    - id: ci-review
      paths:
        - ".github/workflows/**"
        - "action.yml"
      rule_ids:
        - "ci-change"
        - "github-actions-write-all-permissions"
        - "github-actions-pull-request-target"
        - "github-actions-unpinned-action"
      require_roles:
        - "maintainer"
      reason: "GitHub Actions workflow or local action changed."

    - id: block-risk-review
      risk_levels:
        - "block"
      require_roles:
        - "owner"
      reason: "Policy classified this pull request as block risk."
